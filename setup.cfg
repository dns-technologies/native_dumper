[metadata]
name = native-dumper
version = 0.3.6.dev3
description = Library for read and write Native format between Clickhouse and file.

[options]
packages = find:
package_dir =
    = src
install_requires =
    base_dumper==0.1.0.dev5
    nativelib==0.2.3.dev4

[options.packages.find]
where = src

[options.package_data]
* =
    common/queries/*.sql, common/*.pyx, common/*.pyi, common/pyo3http/*.toml, common/pyo3http/src/*.rs
